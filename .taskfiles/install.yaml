---
# yaml-language-server: $schema=https://json.schemastore.org/taskfile.json
version: "3"

tasks:
  base:
    desc: install base packages
    cmds:
      - yay -Sy --needed --noconfirm
        age
        atool
        base
        base-devel
        git
        less
        mise
        neovim
        openssh
        ranger
        sops
        spaceship-prompt
        tig
        tree
        vim
        zsh
        zsh-completions
        zsh-nix-shell
        zsh-syntax-highlighting

  system:
    desc: install system packages
    cmds:
      - yay -Sy --needed --noconfirm
        cups
        ghostscript
        intel-ucode
        libfido2
        linux
        linux-firmware
        networkmanager
        network-manager-openvpn
        noto-fonts
        noto-fonts-emoji
        openvpn
        ttf-dejavu-nerd
        ttf-inconsolata-go-nerd

  nvidia:
    desc: install nvidia packages
    cmds:
      - yay -Sy --needed --noconfirm
        nvidia-open

  devtools:
    desc: install development tools
    cmds:
      - yay -Sy --needed --noconfirm
        azure-cli
        github-cli
        docker
        docker-buildx
        docker-compose
        google-cloud-cli
        google-cloud-cli-gke-gcloud-auth-plugin

  sysutils:
    desc: install system utility packages
    cmds:
      - yay -Sy --needed --noconfirm
        bind
        bluez-utils
        btrfs-progs
        btop
        net-tools
        nvme-cli
        smartmontools
        strace
        traceroute

  wayland:
    desc: install wayland packages
    cmds:
      - yay -Sy --needed --noconfirm
        dunst
        flameshot
        galculator
        gammastep
        gnome-keyring
        google-chrome
        grim
        kanshi
        kitty
        network-manager-applet
        obsidian
        pavucontrol-qt
        pipewire
        pipewire-alsa
        pipewire-pulse
        pipewire-jack
        python-pillow
        qt6-wayland
        slurp
        syncthing
        vesktop-bin
        visual-studio-code-bin
        waybar
        wmenu
        xdg-desktop-portal
        xdg-desktop-portal-gtk
        xdg-desktop-portal-wlr
        xorg-xwayland

  sway:
    desc: install sway packages
    cmds:
      - yay -Sy --needed --noconfirm
        sway
        swaybg
        swaylock

  hyprland:
    desc: install hyprland packages
    cmds:
      - yay -Sy --needed --noconfirm
        hyprland

  ai:
    desc: install AI/GPU compute packages
    cmds:
      - yay -Sy --needed --noconfirm
        intel-compute-runtime-legacy-bin
        intel-graphics-compiler-legacy-bin
        level-zero-headers
        level-zero-loader
        nvidia-container-toolkit

  gaming:
    desc: install gaming packages
    cmds:
      - yay -Sy --needed --noconfirm
        glfw
        prismlauncher

  workstation:
    desc: install workstation packages
    cmds:
      - sudo apt update && sudo apt install --no-install-recommends -y
        atool
        dnsutils
        neovim
        net-tools
        ranger
        strace
        traceroute
      - cmd: |
          if [ ! -d "$HOME/.zsh/spaceship-prompt" ]; then
            git clone --depth=1 git@github.com:spaceship-prompt/spaceship-prompt.git "$HOME/.zsh/spaceship-prompt"
          fi
