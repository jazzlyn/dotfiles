---
# yaml-language-server: $schema=https://json.schemastore.org/taskfile.json
version: "3"

tasks:
  base:
    desc: create base symlinks
    cmds:
      - rm -rf ~/.zshenv ~/.zshrc ~/.config/k9s
      - chsh -s /usr/bin/zsh
      - ln -rsf zsh/.zshenv ~/
      - ln -rsf zsh/.zshrc ~/
      - ln -rsf k9s ~/.config/
      - mkdir -p ~/.config/git
      - ln -rsf git/config ~/.config/git/
      - "[ -f ~/.secrets/github-strg.conf ] && ln -rsf ~/.secrets/github-strg.conf ~/.config/git/config.strg"
      - ln -rsf git/gitignore ~/.config/git/
      - ln -rsf wayland/chrome-flags.conf ~/.config/
      - ln -rsf wayland/code-flags.conf ~/.config/
      - ln -rsf wayland/electron-flags.conf ~/.config/
    ignore_error: true

  apps:
    desc: create app symlinks
    cmds:
      - command -v starship > /dev/null 2>&1 && ln -rsf starship/starship.toml ~/.config/starship.toml
      - command -v claude > /dev/null 2>&1 && mkdir -p ~/.claude && ln -rsf claude/settings.json ~/.claude/settings.json
      - command -v gammastep > /dev/null 2>&1 && ln -rsf gammastep ~/.config/
      - command -v hyprland > /dev/null 2>&1 && ln -rsf hypr ~/.config/
      - command -v kanshi > /dev/null 2>&1 && ln -rsf kanshi ~/.config/
      - command -v kitty > /dev/null 2>&1 && ln -rsf kitty ~/.config/
      - command -v mise > /dev/null 2>&1 && ln -rsf mise ~/.config/
      - command -v nvim > /dev/null 2>&1 && mkdir -p ~/.config/nvim && ln -rsf nvim/init.vim ~/.config/nvim && ln -rsf nvim/init.vim ~/.vimrc
      - command -v opencode > /dev/null 2>&1 && mkdir -p ~/.config/opencode && ln -rsf opencode/opencode.jsonc ~/.config/opencode/opencode.jsonc && ln -rsf opencode/tui.json ~/.config/opencode/tui.json
      - command -v pacman > /dev/null 2>&1 && mkdir -p ~/.config/pacman && ln -rsf makepkg.conf ~/.config/pacman/makepkg.conf
      - command -v wireplumber > /dev/null 2>&1 && ln -rsf wireplumber ~/.config/
      - command -v ranger > /dev/null 2>&1 && mkdir -p ~/.config/ranger && ln -rsf ranger/commands.py ~/.config/ranger/commands.py && ln -rsf ranger/rc.conf ~/.config/ranger/rc.conf && ln -rsf ranger/scope.sh ~/.config/ranger/scope.sh
      - command -v rofi > /dev/null 2>&1 && ln -rsf rofi ~/.config/
      - command -v sway > /dev/null 2>&1 && ln -rsf sway ~/.config/
      - command -v swayidle > /dev/null 2>&1 && ln -rsf swayidle ~/.config/
      - command -v waybar > /dev/null 2>&1 && ln -rsf waybar ~/.config/
      - command -v yay > /dev/null 2>&1 && ln -rsf yay/config.json ~/.config/yay/config.json
    ignore_error: true

  opencode:
    desc: create opencode specific symlinks
    cmds:
      - ln -rsf opencode/bashrc ~/.bashrc
      - ln -rsf mise ~/.config/
      - mkdir -p ~/.config/git
      - ln -rsf git/config ~/.config/git/config
      - ln -rsf git/gitignore ~/.config/git/gitignore
      - ln -rsf opencode/gitconfig ~/.config/git/config.opencode
      - mkdir -p ~/.config/opencode
      - ln -rsf opencode/opencode.jsonc ~/.config/opencode/opencode.jsonc
      - ln -rsf opencode/tui.json ~/.config/opencode/tui.json
